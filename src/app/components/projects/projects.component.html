<section id="projects" class="projects-section">

    <div class="section-header animate-on-scroll">
        <h2 class="section-title">Proyectos</h2>
        <p class="section-sub">Algunos de los proyectos que he desarrollado</p>
    </div>

    <div class="projects-grid">

        <div class="project-card animate-on-scroll" *ngFor="let project of projects; let ci = index"
            [class.confidential-card]="project.confidential">

            <div class="card-image">

                <ng-container *ngIf="!project.confidential; else confidentialImg">

                    <div class="slides">
                        <img *ngFor="let img of project.images; let ii = index" [src]="img"
                            [alt]="project.title + ' imagen ' + (ii + 1)" [class.active]="activeIndex[ci] === ii"
                            (click)="openLightbox(img)" style="cursor: zoom-in;" />
                    </div>

                    <ng-container *ngIf="project.images.length > 1">
                        <button class="arrow arrow-left" (click)="prev(ci)">&#8249;</button>
                        <button class="arrow arrow-right" (click)="next(ci)">&#8250;</button>

                        <div class="dots">
                            <span *ngFor="let img of project.images; let ii = index" class="dot"
                                [class.active]="activeIndex[ci] === ii" (click)="goTo(ci, ii)">
                            </span>
                        </div>
                    </ng-container>

                    <div class="img-overlay"></div>
                </ng-container>

                <ng-template #confidentialImg>
                    <div class="confidential-placeholder">
                        <div class="lock-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="11" width="18" height="11" rx="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </div>
                        <span>Proyecto confidencial</span>
                    </div>
                </ng-template>

            </div>

            <div class="card-body">

                <div class="card-top">
                    <h3>{{ project.title }}</h3>
                    <span class="badge" *ngIf="project.confidential">NDA</span>
                </div>

                <p class="card-desc">{{ project.description }}</p>

                <div class="tags">
                    <span class="tag" *ngFor="let tag of project.tags">{{ tag }}</span>
                </div>

                <!-- Botones proyectos normales -->
                <div class="card-actions" *ngIf="!project.confidential">
                    <a *ngIf="project.repo" [href]="project.repo" target="_blank" class="btn-card btn-outline">
                        GitHub
                    </a>
                    <a *ngIf="project.demo" [href]="project.demo" target="_blank" class="btn-card btn-solid">
                        Ver proyecto →
                    </a>
                </div>

                <div class="confidential-note" *ngIf="project.confidential">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14"
                        height="14">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 8v4m0 4h.01" />
                    </svg>
                    Acuerdo de confidencialidad firmado
                </div>

            </div>
        </div>

    </div>
    <div class="lightbox-backdrop" *ngIf="lightboxOpen" (click)="closeLightbox()">

        <div class="lightbox-box" (click)="$event.stopPropagation()">

            <button class="lightbox-close" (click)="closeLightbox()">✕</button>

            <img [src]="lightboxImg" alt="Vista ampliada" />

        </div>
    </div>
</section>
